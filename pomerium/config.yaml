# Placeholder Pomerium configuration. Replace with your real certificate files and policy values.
# Refer to the project README for the next steps.

authenticate_service_url: https://pomerium
certificate: /etc/pomerium/certs/pomerium.crt
certificate_key: /etc/pomerium/certs/pomerium.key
shared_secret: "REPLACE_WITH_RANDOM_VALUE"

# Routes define access to the frontend application zone.
routes:
  - from: https://frontend.local
    to: http://frontend:5000
    allowed_users:
      - "*@company.com"

# Policies can be expanded to enforce email, group, or identity-based access.
policy:
  - from: https://frontend.local
    to: http://frontend:5000
    allow: "email.endsWith('@company.com')"
