<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zero Trust Frontend</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    #result { margin-top: 1rem; white-space: pre-wrap; }
    input { padding: 0.5rem; width: 300px; }
    button { margin-left: 0.5rem; padding: 0.5rem 1rem; }
  </style>
</head>
<body>
  <h1>Zero Trust Frontend</h1>
  <p>Frontend container is working.</p>
  <div>
    <button id="fetchData">Fetch Stored Items</button>
  </div>
  <div style="margin-top: 1rem;">
    <input id="newValue" placeholder="Enter new item value" />
    <button id="saveData">Save to Backend</button>
  </div>
  <div id="result"></div>

  <script>
    function showResult(data) {
      document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
    }

    async function fetchJson(response) {
      const contentType = response.headers.get('content-type') || '';
      if (contentType.includes('application/json')) {
        return response.json();
      }
      const text = await response.text();
      throw new Error(`Expected JSON response, got ${response.status} ${response.statusText}: ${text}`);
    }

    document.getElementById('fetchData').addEventListener('click', async () => {
      try {
        const response = await fetch('/api/data');
        if (!response.ok) {
          const errorText = await response.text();
          showResult({ error: `Request failed ${response.status}: ${response.statusText}`, details: errorText });
          return;
        }
        const data = await fetchJson(response);
        showResult(data);
      } catch (error) {
        showResult({ error: error.message });
      }
    });

    document.getElementById('saveData').addEventListener('click', async () => {
      const value = document.getElementById('newValue').value.trim();
      if (!value) {
        showResult({ error: 'Please enter a value first.' });
        return;
      }

      try {
        const response = await fetch('/api/data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ value })
        });
        if (!response.ok) {
          const errorText = await response.text();
          showResult({ error: `Request failed ${response.status}: ${response.statusText}`, details: errorText });
          return;
        }
        const data = await fetchJson(response);
        showResult(data);
      } catch (error) {
        showResult({ error: error.message });
      }
    });
  </script>
</body>
</html>
