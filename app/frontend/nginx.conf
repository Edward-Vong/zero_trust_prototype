server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 ipv6=off valid=10s;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /api/ {
        set $api_upstream https://api.local:4000;
        proxy_pass $api_upstream;
        proxy_ssl_server_name on;
        proxy_ssl_name api.local;
        proxy_ssl_certificate     /etc/nginx/certs/frontend/frontend.crt;
        proxy_ssl_certificate_key /etc/nginx/certs/frontend/frontend.key;
        proxy_ssl_trusted_certificate /etc/nginx/certs/ca_chain.crt;
        proxy_ssl_verify          on;
        proxy_ssl_verify_depth    2;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}