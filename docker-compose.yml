version: "3.9"

services:
  step-ca:
    image: smallstep/step-ca:latest
    container_name: zt_step_ca
    environment:
      - STEPPATH=/home/step
    volumes:
      - ./step-ca:/home/step
    command: ["step-ca", "/home/step/config/ca.json"]
    ports:
      - "9000:9000"
    networks:
      - internal
    restart: unless-stopped

  pomerium:
    image: pomerium/pomerium:latest
    container_name: zt_pomerium
    depends_on:
      - frontend
      - step-ca
    volumes:
      - ./pomerium:/etc/pomerium
    command: ["pomerium", "--config", "/etc/pomerium/config.yaml"]
    ports:
      - "443:443"
    networks:
      - ingress
      - internal
    restart: unless-stopped

  frontend:
    build:
      context: ./services/frontend
    container_name: zt_frontend
    depends_on:
      - internal-api
    networks:
      - internal
    environment:
      - INTERNAL_API_URL=http://internal-api:5001
    ports:
      - "5000:5000"
    restart: unless-stopped

  internal-api:
    build:
      context: ./services/internal-api
    container_name: zt_internal_api
    depends_on:
      - backend
    networks:
      - internal
    environment:
      - BACKEND_URL=http://backend:5002
    ports:
      - "5001:5001"
    restart: unless-stopped

  backend:
    build:
      context: ./services/backend
    container_name: zt_backend
    networks:
      - internal
    ports:
      - "5002:5002"
    restart: unless-stopped

  wireguard:
    image: linuxserver/wireguard:latest
    container_name: zt_wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - SERVERURL=wireguard
      - SERVERPORT=51820
      - PEERS=1
      - PEERDNS=1.1.1.1
    volumes:
      - ./wireguard/config:/config
    ports:
      - "51820:51820/udp"
    networks:
      - internal
      - wg
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped

networks:
  internal:
    driver: bridge
  ingress:
    driver: bridge
  wg:
    driver: bridge
