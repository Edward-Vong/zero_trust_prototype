services:
  frontend:
    build: ./app/frontend
    container_name: zt-frontend
    networks:
      - edge_net
      - app_net

  api:
    build: ./app/api
    container_name: zt-api
    environment:
      DATABASE_HOST: backend
      DATABASE_PORT: 5432
      DATABASE_NAME: appdb
      DATABASE_USER: appuser
      DATABASE_PASSWORD: apppass
    networks:
      - app_net
      - data_net
    depends_on:
      - backend

  backend:
    image: postgres:16
    container_name: zt-backend
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data_net

  step-ca:
    image: smallstep/step-ca:latest
    container_name: zt-step-ca
    ports:
      - "9000:9000"
    volumes:
      - ./infrastructure/step-ca:/home/step
    environment:
      - STEPPATH=/home/step
    command: step-ca /home/step/config/ca.json --password-file /home/step/secrets/password
    networks:
      - app_net
    restart: unless-stopped

  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - SERVERURL=???
      - PEERS=??? # Actual machine addresses?
      - PEERDNS=auto
      - INTERNAL_SUBNET=???
      - ALLOWEDIPS = ??? # Subnet IP addresses
    volumes:
      - ./infrastrcture/wireguard:/config
      - /lib/modules:/lib/modules
    ports:
      - 51820:51820/udp
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  edge_net:
  app_net:
  data_net:
