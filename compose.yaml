services:
  frontend:
    build: ./app/frontend
    container_name: zt-frontend
    ports:
      - "80:80"
    networks:
      edge_net:
        ipv4_address: 172.20.0.10
      app_net:
        ipv4_address: 172.21.0.10

  api:
    build: ./app/api
    container_name: zt-api
    ports:
      - "4000:4000"
    networks:
      app_net:
        ipv4_address: 172.21.0.11
    depends_on:
      - backend

  backend:
    build: ./app/backend
    container_name: zt-backend
    ports:
      - "5000:5000"
    networks:
      app_net:
        ipv4_address: 172.21.0.12
    volumes:
      - backend_data:/app/data

  step-ca:
    image: smallstep/step-ca:latest
    container_name: zt-step-ca
    ports:
      - "9000:9000"
    volumes:
      - ./infrastructure/step-ca:/home/step
    environment:
      - STEPPATH=/home/step
    command: step-ca /home/step/config/ca.json --password-file /home/step/secrets/password
    networks:
      app_net:
        ipv4_address: 172.21.0.13
    restart: unless-stopped

  pomerium:
    image: pomerium/pomerium:latest
    ports:
      - 443:443
    restart: always
    environment:
      POMERIUM_ZERO_TOKEN: ${POMERIUM_ZERO_TOKEN}
      XDG_CACHE_HOME: /var/cache
    volumes:
      - pomerium-cache:/var/cache
    networks:
      main:
        aliases:
          - verify.able-snail-8528.pomerium.app
  verify:
    image: pomerium/verify:latest
    networks:
      main:
        aliases:
          - verify

volumes:
  backend_data:
  pomerium-cache:

networks:
  main: {}
  edge_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
  app_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16