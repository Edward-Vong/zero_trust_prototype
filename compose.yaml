services:
  frontend:
    build: ./app/frontend
    container_name: zt-frontend
    networks:
      - edge_net
      - app_net

  api:
    build: ./app/api
    container_name: zt-api
    environment:
      DATABASE_HOST: backend
      DATABASE_PORT: 5432
      DATABASE_NAME: appdb
      DATABASE_USER: appuser
      DATABASE_PASSWORD: apppass
    networks:
      - app_net
      - data_net
    depends_on:
      - backend

  backend:
    image: postgres:16
    container_name: zt-backend
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data_net

  step-ca:
    image: smallstep/step-ca:latest
    container_name: zt-step-ca
    ports:
      - "9000:9000"
    volumes:
      - /infrastructure/step-ca:/home/step"
    networks:
      - app_net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  edge_net:
  app_net:
  data_net: