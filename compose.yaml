services:
  frontend:
    build: ./app/frontend
    container_name: zt-frontend
    networks:
      - edge_net
      - app_net

  api:
    build: ./app/api
    container_name: zt-api
    networks:
      - app_net
    depends_on:
      - backend

  backend:
    build: ./app/backend
    container_name: zt-backend
    networks:
      - app_net
    volumes:
      - backend_data:/app/data

volumes:
  backend_data:

networks:
  edge_net:
  app_net: