services:
  frontend:
    build: ./app/frontend
    container_name: zt-frontend
    ports:
      - "80:80"
    networks:
      - edge_net
      - app_net

  api:
    build: ./app/api
    container_name: zt-api
    ports:
      - "4000:4000"
    networks:
      - app_net
    depends_on:
      - backend

  backend:
    build: ./app/backend
    container_name: zt-backend
    ports:
      - "5000:5000"
    networks:
      - app_net
    volumes:
      - backend_data:/app/data

  step-ca:
    image: smallstep/step-ca:latest
    container_name: zt-step-ca
    ports:
      - "9000:9000"
    volumes:
      - ./infrastructure/step-ca:/home/step
    environment:
      - STEPPATH=/home/step
    command: step-ca /home/step/config/ca.json --password-file /home/step/secrets/password
    networks:
      - app_net
    restart: unless-stopped

volumes:
  backend_data:

networks:
  edge_net:
  app_net: