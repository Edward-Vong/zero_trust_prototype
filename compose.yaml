services:
  attacker:
    image: alpine:latest
    container_name: zt-attacker
    # HTTP access, port probing, TLS testing, advanced proof
    command: sh -c "apk add --no-cache curl bind-tools openssl netcat-openbsd tcpdump && sleep infinity"
    networks:
      edge_net:
        ipv4_address: 172.21.0.30

  frontend:
    build: ./app/frontend
    container_name: zt-frontend
    command: nginx -g 'daemon off;'
    expose:
      - "80"
    volumes:
      - ./infrastructure/step-ca/issued/frontend:/etc/nginx/certs/frontend:ro
      - type: bind
        source: ./infrastructure/step-ca/certs/ca_chain.crt
        target: /etc/nginx/certs/ca_chain.crt
        read_only: true
        bind:
          create_host_path: false
    networks:
      frontend_private_net: {}
      frontend_api_net:
        ipv4_address: 172.31.11.10
      pomerium_frontend_net: {}
    depends_on:
      api:
        condition: service_started
      step-ca:
        condition: service_healthy

  api:
    build: ./app/api
    container_name: zt-api
    expose:
      - "4000"
    volumes:
      - ./infrastructure/step-ca/issued/api:/app/certs/api:ro
      - type: bind
        source: ./infrastructure/step-ca/certs/ca_chain.crt
        target: /app/certs/ca_chain.crt
        read_only: true
        bind:
          create_host_path: false
    networks:
      api_private_net: {}
      frontend_api_net:
        ipv4_address: 172.31.11.11
        aliases:
          - api.local
      api_backend_net:
        ipv4_address: 172.31.12.10
    depends_on:
      backend:
        condition: service_started
      step-ca:
        condition: service_healthy

  backend:
    build: ./app/backend
    container_name: zt-backend
    expose:
      - "5000"
    volumes:
      - ./infrastructure/step-ca/issued/backend:/app/certs/backend:ro
      - type: bind
        source: ./infrastructure/step-ca/certs/ca_chain.crt
        target: /app/certs/ca_chain.crt
        read_only: true
        bind:
          create_host_path: false
      - backend_data:/app/data
    networks:
      backend_private_net: {}
      api_backend_net:
        ipv4_address: 172.31.12.11
        aliases:
          - backend.local
    depends_on:
      step-ca:
        condition: service_healthy

  step-ca:
    image: smallstep/step-ca:latest
    container_name: zt-step-ca
    ports:
      - "9000:9000"
    volumes:
      - ./infrastructure/step-ca:/home/step
    environment:
      - STEPPATH=/home/step
      - DOCKER_STEPCA_INIT_NAME=Zero Trust Prototype CA
      - DOCKER_STEPCA_INIT_DNS_NAMES=localhost,step-ca,app.zt.local,api.zt.local
      - DOCKER_STEPCA_INIT_PROVISIONER_NAME=admin
    command:
      - sh
      - -ec
      - |
        tr -d '\r' < /home/step/init-step-ca.sh > /tmp/init-step-ca.sh
        chmod +x /tmp/init-step-ca.sh
        exec /tmp/init-step-ca.sh
    healthcheck:
      test:
        - "CMD-SHELL"
        - "test -s /home/step/issued/frontend/frontend.crt && test -s /home/step/issued/api/api.crt && test -s /home/step/issued/backend/backend.crt && test -s /home/step/certs/pomerium/tls.crt && test -s /home/step/certs/pomerium/tls.key && step ca health --ca-url https://localhost:9000 --root /home/step/certs/root_ca.crt >/dev/null 2>&1"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      control_net:
        ipv4_address: 172.31.30.13
    restart: unless-stopped

  pomerium:
    image: pomerium/pomerium:latest
    container_name: zt-pomerium
    ports:
      - '443:443'
      - '80:80'
    volumes:
      - ./infrastructure/pomerium/config.yaml:/pomerium/config.yaml:ro
      - ./infrastructure/step-ca/certs/pomerium:/pomerium/certs:ro
      - pomerium-data:/data/
    environment:
      - POMERIUM_SHARED_SECRET=${POMERIUM_SHARED_SECRET}
      - POMERIUM_COOKIE_SECRET=${POMERIUM_COOKIE_SECRET}
    command: --config /pomerium/config.yaml
    networks:
      edge_net:
        ipv4_address: 172.21.0.20
      pomerium_frontend_net: {}
    depends_on:
      - frontend
    restart: unless-stopped

  verify:
    image: pomerium/verify:latest
    container_name: zt-verify
    networks:
      control_net:
        ipv4_address: 172.31.30.14

  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    profiles:
      - wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - SERVERURL=auto
      - PEERS=frontend,api,backend
      - PEERDNS=auto
      - INTERNAL_SUBNET=10.13.13.0/24
      - ALLOWEDIPS=10.13.13.0/24
    volumes:
      - ./infrastructure/wireguard:/config
      - /lib/modules:/lib/modules
    ports:
      - 51820:51820/udp
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    networks:
      control_net:
        ipv4_address: 172.31.30.2
    restart: unless-stopped

volumes:
  backend_data:
  pomerium-data:

networks:
  edge_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
  frontend_private_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.1.0/24
  api_private_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.2.0/24
  backend_private_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.3.0/24
  frontend_api_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.11.0/24
  api_backend_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.12.0/24
  pomerium_frontend_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.21.0/24
  control_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.30.0/24
