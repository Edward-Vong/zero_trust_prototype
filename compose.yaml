services:
  frontend:
    build: ./app/frontend
    container_name: zt-frontend
    ports:
      - "80:80"
    networks:
      edge_net:
        ipv4_address: 172.20.0.10
      app_net:
        ipv4_address: 172.21.0.10

  api:
    build: ./app/api
    container_name: zt-api
    ports:
      - "4000:4000"
    networks:
      app_net:
        ipv4_address: 172.21.0.11
    depends_on:
      - backend

  backend:
    build: ./app/backend
    container_name: zt-backend
    ports:
      - "5000:5000"
    networks:
      app_net:
        ipv4_address: 172.21.0.12
    volumes:
      - backend_data:/app/data

  step-ca:
    image: smallstep/step-ca:latest
    container_name: zt-step-ca
    ports:
      - "9000:9000"
    volumes:
      - ./infrastructure/step-ca:/home/step
    environment:
      - STEPPATH=/home/step
    command: step-ca /home/step/config/ca.json --password-file /home/step/secrets/password
    networks:
      app_net:
        ipv4_address: 172.21.0.13
    restart: unless-stopped

  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - SERVERURL=???
      - PEERS=??? # Actual machine addresses?
      - PEERDNS=auto
      - INTERNAL_SUBNET=???
      - ALLOWEDIPS = ??? # Subnet IP addresses
    volumes:
      - ./infrastrcture/wireguard:/config
      - /lib/modules:/lib/modules
    ports:
      - 51820:51820/udp
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - edge_net
      - app_net
      - data_net
    restart: unless-stopped

volumes:
  backend_data:

networks:
  edge_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
  app_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
